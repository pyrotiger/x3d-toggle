# This is where you adjust detection thresholds and polling intervals. 

# Polling Interval (in seconds)
# How often the daemon checks for game/compute activity.
# Range: 1-10 (Lower = faster response but uses more CPU resources, higher = less CPU usage)
POLL_INTERVAL=3

# Compute Load Threshold
# System load average (1 min) required to trigger "Cheetah Mode" (Frequency/CCD1).
# Default: 8.0 (tuned for 16-core CPUs like 7950X3D/9950X3D)
# Range: 4.0 - 12.0 (Lower = more aggressive switching to Frequency CCD - may cause false positives, Higher = more conservative switching - may miss some compute workloads)
COMPUTE_LOAD_THRESHOLD=8.0

# Game Detection Mode
# 1 = Strict (Only steam/gamemode)
# 2 = Loose (Also checks for high-load processes matching .desktop categories)
GAME_DETECTION_MODE=2

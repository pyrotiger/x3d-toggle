# X3D-Toggle v1.2.0 - Configuration
#Copyright (C) 2026 Pyrotiger

# This is where you adjust detection thresholds and polling intervals. 

# Polling Interval (in seconds)
# How often the daemon checks for game/compute activity.
# Range: 1-10 (Lower = faster response but uses more CPU resources, higher = less CPU usage)
POLL_INTERVAL=3

# Compute Load Threshold (Percentage)
# Total CPU usage percentage required to trigger "Cheetah Mode" (Frequency/CCD1).
# Measured over a 200ms sample window.
# Default: 50 (50% total CPU usage across all cores)
# Range: 10 - 90 (Lower = more aggressive switching, Higher = requires heavier load)
COMPUTE_LOAD_THRESHOLD=50

# Game Detection Mode
# 1 = Strict (Only steam/gamemode)
# 2 = Loose (Also checks for high-load processes matching .desktop categories)
GAME_DETECTION_MODE=2

# Developer Mode (0/1)
# When enabled (1), the GUI will expose Developer Tools (sandboxed helpers).
# Enable via the developer helper in `dev/` for persistent use, or set the
# environment variable `X3D_DEV_MODE=1` for a temporary session.
DEVELOPER_MODE=0
